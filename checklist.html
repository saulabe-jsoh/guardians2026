      useEffect(() => {
        if (ref.current && window.lucide) {
          ref.current.innerHTML = `<i data-lucide="${name}" class="${className}"></i>`;
          window.lucide.createIcons({
            attrs: { class: className },
            nameAttr: 'data-lucide'
          });
        }

      return <span ref={ref} className="inline-flex items-center justify-center" {...props} />;
    };

                  <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div className="bg-[#0f1124] border border-red-950/30 rounded-2xl p-5">
                      <h4 className="text-xs font-bold text-white mb-3">상황적 범죄 행위 (C-Factors)</h4>
                      <div className="flex flex-col gap-2">
                        {KSAS_C_ITEMS.map(item => (
                          <label key={item.id} className="flex items-start gap-2 p-2 rounded-lg bg-[#090b0e] border border-red-950/10 cursor-pointer">
                            <input
                              type="checkbox"
                              checked={cScores[item.id]}
                              onChange={(e) => setCScores({ ...cScores, [item.id]: e.target.checked })}
                              className="mt-0.5 accent-rose-500"
                            />
                            <div>
                              <span className="text-[11px] font-bold text-slate-200 block">{item.title}</span>
                              <span className="text-[9px] text-slate-500">{item.desc}</span>
                            </div>
                          </label>
                        ))}
                      </div>
                    </div>

                    <div className="bg-[#0f1124] border border-red-950/30 rounded-2xl p-5">
                      <h4 className="text-xs font-bold text-white mb-3">가해자 위험 폭력성 (P-Factors)</h4>
                      <div className="flex flex-col gap-2">
                        {KSAS_P_ITEMS.map(item => (
                          <label key={item.id} className="flex items-start gap-2 p-2 rounded-lg bg-[#090b0e] border border-red-950/10 cursor-pointer">
                            <input
                              type="checkbox"
                              checked={pScores[item.id]}
                              onChange={(e) => setPScores({ ...pScores, [item.id]: e.target.checked })}
                              className="mt-0.5 accent-rose-500"
                            />
                            <div>
                              <span className="text-[11px] font-bold text-slate-200 block">{item.title}</span>
                              <span className="text-[9px] text-slate-500">{item.desc}</span>
                            </div>
                          </label>
                        ))}
                      </div>
                    </div>
                  </div>

                </div>

                {/* Right Risk Assessment Output (5/12) */}
                <div className="lg:col-span-5 flex flex-col gap-6">
                  
                  {/* Risk Gauge Widget */}
                  <div className="bg-[#0f1124] border border-red-950/30 rounded-2xl p-6 flex flex-col items-center justify-center text-center">
                    <span className="text-xs font-bold text-slate-400 uppercase tracking-widest mb-3 block">스토킹 위험도 분석 종합 지표</span>
                    
                    {/* SVG Radial Gauge */}
                    <div className="relative flex items-center justify-center w-40 h-40">
                      <svg className="w-full h-full transform -rotate-90">
                        <circle
                          cx="80" cy="80" r="68"
                          className="stroke-[#12152b]" strokeWidth="10" fill="transparent"
                        />
                        <circle
                          cx="80" cy="80" r="68"
                          className={`transition-all duration-500 ease-out ${
                            parseFloat(riskResult.index) >= 75 ? "stroke-red-500" : parseFloat(riskResult.index) >= 50 ? "stroke-orange-500" : "stroke-yellow-400"
                          }`}
                          strokeWidth="10" fill="transparent"
                          strokeDasharray={2 * Math.PI * 68}
                          strokeDashoffset={2 * Math.PI * 68 * (1 - parseFloat(riskResult.index) / 100)}
                          strokeLinecap="round"
                        />
                      </svg>
                      <div className="absolute flex flex-col items-center">
                        <span className="text-4xl font-extrabold text-white font-mono">{riskResult.index}%</span>
                        <span className="text-[9px] text-rose-400 flex items-center gap-1 mt-1">
                          <Clock className="w-3 h-3 text-rose-500" />
                          실시간 스캔 완료
                        </span>
                      </div>
                    </div>

                    <div className={`mt-5 p-4 rounded-xl border text-center w-full transition ${riskResult.tier.bg} ${riskResult.tier.border}`}>
                      <span className={`text-base font-extrabold ${riskResult.tier.color} block`}>
                        {riskResult.tier.name}
                      </span>
                      <div className="mt-1 flex items-center justify-center gap-2">
                        <span className="text-xs text-slate-400">대응출동 지령코드:</span>
                        <span className="text-xs font-bold font-mono text-white px-2 py-0.5 bg-black/40 rounded border border-white/10">
                          {riskResult.tier.code}
                        </span>
                      </div>
                    </div>
                  </div>

                  {/* Police Report Terminal */}
                  <div className="bg-[#0f1124] border border-red-950/30 rounded-2xl p-6 flex flex-col flex-1">
                    <div className="flex justify-between items-center mb-3">
                      <h3 className="text-xs font-bold text-white flex items-center gap-1.5">
                        <FileText className="w-4 h-4 text-rose-400" />
                        수사보조 상황 보고서 출력 (K-SAS 진단서)
                      </h3>
                      <button
                        onClick={handleCopyReport}
                        className="flex items-center gap-1 px-3 py-1 bg-red-950/40 hover:bg-red-950 text-xs font-bold rounded-lg border border-red-900/30 text-rose-400 transition"
                      >
                        {copied ? (
                          <span className="flex items-center gap-1 text-emerald-400">
                            <Check className="w-3 h-3" /> 복사 완료
                          </span>
                        ) : (
                          <>
                            <Copy className="w-3 h-3" />
                            보고서 내보내기
                          </>
                        )}
                      </button>
                    </div>

                    <div className="bg-[#060810] border border-red-950/20 rounded-xl p-4 flex-1 font-mono text-[10.5px] text-slate-300 leading-relaxed overflow-y-auto max-h-[380px] md:max-h-[500px] whitespace-pre-wrap select-all shadow-inner">
                      {generatePoliceReport()}
                    </div>
                  </div>

                </div>

              </div>
            )}

          </main>

          {/* Global Footer */}
          <footer className="border-t border-red-950/40 bg-[#0c0e1e] py-6 px-8 text-center text-xs text-slate-500 mt-12">
            <p>© 2026 Stalking Risk Evaluation Research Group. All Rights Reserved. 본 프로그램은 한국판 스토킹 위험성 평가 도구(K-SAS) 계수 검증용 시뮬레이터입니다.</p>
          </footer>

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
